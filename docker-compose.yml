services:
  djangopardy:
    container_name: djangopardy
    image: codeberg.org/margau/djangopardy:latest@sha256:1971ca867dd8b58e43f728cf1c36e54a0e0ac2f684ed05915fa55d54b6060798
    volumes: 
    - ./files:/app/files
    - ./djangopardy.cfg:/app/djangopardy.cfg
    - ./db.sqlite3:/app/db.sqlite3
    - static:/app/static
  
  nginx:
    image: nginx:latest@sha256:bc45d248c4e1d1709321de61566eb2b64d4f0e32765239d66573666be7f13349
    ports:
      - "8000:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./files:/media:ro
      - static:/static:ro
    depends_on:
      - djangopardy

volumes:
  static: