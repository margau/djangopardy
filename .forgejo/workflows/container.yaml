name: Build and Push Container Image

on:
  push:

env:
  REGISTRY: codeberg.org

jobs:
  build-and-push-image:
    runs-on: docker-builder
    container: 
      image: codeberg.org/margau/buildenv-container-builder:latest@sha256:c8c07e3fa2b5970354f8a340faa422e8c29fcb525c6e377008608d2f4342bfe4
    steps:
    - uses: https://code.forgejo.org/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        fetch-depth: 0
    - name: cache restore
      uses: https://code.forgejo.org/actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
      with:
        path: |
          /var/lib/containers
        key: buildah-images

    - name: Docker Metadata
      id: docker-metadata
      uses: https://github.com/docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
      with:
        images: |
          ${{ env.REGISTRY }}/${{ github.repository }}
        tags: |
          type=sha,enable=${{ !(github.ref == format('refs/heads/{0}', 'main') || startsWith(github.ref, 'refs/tags/')) }}
          type=pep440,pattern={{version}}
          type=raw,value=main,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

    - name: Build
      id: build-image
      uses: https://github.com/redhat-actions/buildah-build@061ffd31bb5c3f8733a6f9bbdf00a9fb02eb708c # main
      with:
        containerfiles: |
          ./Containerfile
        tags: ${{ steps.docker-metadata.outputs.tags }}
        labels: ${{ steps.docker-metadata.outputs.labels }}
        platforms: linux/amd64,linux/arm64
        layers: true
    
    - name: Push
      if: github.ref == format('refs/heads/{0}', 'main') || startsWith(github.ref, 'refs/tags/') # only push on main branch or tags
      uses: https://github.com/redhat-actions/push-to-registry@3916dcf329473955be3059ef62c9c062ea1b9054 # main
      with:
        image: ${{ steps.build-image.outputs.image }}
        tags: ${{ steps.build-image.outputs.tags }}
        username: ${{ github.actor }}
        password: ${{ secrets.CONTAINER_TOKEN }}

    - name: cache save
      uses: https://code.forgejo.org/actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
      with:
        path: |
          /var/lib/containers
        key: buildah-images